<!-- 
 
<meta viewport>: Ajusta o site ao celular. 

<link icon>: Coloca seu ícone na aba do navegador.

.main-login: Caixa "pai" que segura tudo.

.left / .right: Divide a tela em duas colunas.

.textfield: Agrupa o ícone, o rótulo e o campo de digitação. 

-->


<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tela de login</title>
        <link rel="icon" type="image/png" sizes="32x32" href="media/my_icon.png">
        <link rel="icon" type="image/png" sizes="16x16" href="media/my_icon.png">
        <link rel="apple-touch-icon" href="media/my_icon.png">
        <link rel="shortcut icon" href="media/my_icon.png" type="image/x-icon">
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>
        <div class="main-login">

            <div class="left-login">
                <h1>Faça login<br>Entre para o nosso time</h1>
                <img src="media/astronauta.svg" class="left-login-image" alt="Astronauta animação" >
            </div>

            <div class="right-login">
                <div class="card-login">
                    <h1>LOGIN</h1>
                    <div class="textfield">
                        <label for="usuario"><img src="media/sombra-de-usuario-masculino.png" width="30px" alt="icone de login"/> </label>
                        <input type="text" name="usuario" placeholder="Usuário">
                        <label for="senha"><img src="media/senha.png" alt="icone de cadeado com característicos no meio" width="30px"></label>
                        <input type="password" name="senha" placeholder="Senha">
                    </div>
                            <a href="index.html"> 
                             <button  class="btn-login">
                                Login
                                </button>
                            </a>
                </div>
            </div>
        </div>
        <footer>&copy; Desenvolvido por Iasmin Corrêa</footer>
    </body>

</html>
